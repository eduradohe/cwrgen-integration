name: CWRGen Integration

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - cwrgen-changed
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  linux-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout integration harness
        uses: actions/checkout@v6
        with:
          path: cwrgen-integration

      - name: Checkout CWRGen
        uses: actions/checkout@v6
        with:
          repository: eduradohe/cwrgen
          ref: main
          path: cwrgen

      - name: Run integration tests
        run: CWGEN_SOURCE="$GITHUB_WORKSPACE/cwrgen" ./cwrgen-integration/scripts/run-all.sh

  windows-integration:
    runs-on: windows-latest

    steps:
      - name: Checkout integration harness
        uses: actions/checkout@v6
        with:
          path: cwrgen-integration

      - name: Checkout CWRGen
        uses: actions/checkout@v6
        with:
          repository: eduradohe/cwrgen
          ref: main
          path: cwrgen

      - name: Run Windows install smoke tests
        shell: pwsh
        run: .\cwrgen-integration\scripts\windows-ci\run-install-smoke.ps1 -CwgenSource .\cwrgen
